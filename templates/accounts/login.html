{% extends "base.html" %}

{% block title %}Log in — Desktap{% endblock %}

{% block content %}
<h1>Log in</h1>
<form method="post" class="form-card">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Continue to 2FA</button>
</form>
<p>Need an account? <a href="{% url 'accounts:signup' %}">Sign up</a></p>
{% endblock %}

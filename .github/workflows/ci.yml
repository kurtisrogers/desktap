name: CI

on:
  push:
    branches: [main, "skynet/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Django system check
        run: python manage.py check

      - name: Run unit tests
        run: python manage.py test

      - name: Run BDD tests
        run: pytest tests/bdd -q

      - name: Coverage report
        run: |
          coverage run --source='accounts,core,posts,moderation' manage.py test
          coverage run -a --source='accounts,core,posts,moderation' -m pytest tests/bdd -q
          coverage report --fail-under=55
